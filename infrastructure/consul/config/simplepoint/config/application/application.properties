server.host=${SERVER_HOST:localhost}
server.public-scheme=${SERVER_PUBLIC_SCHEME:http}
server.public-host=${SERVER_PUBLIC_HOST:${server.host}}
server.oauth2.issuer-uri=${SERVER_OAUTH2_ISSUER_URI:http://${server.host}:2999}
server.oauth2.client.base-uri=${SERVER_OAUTH2_CLIENT_BASE_URI:${server.public-scheme}://${server.public-host}:2555}
simplepoint.security.oauth2.token.audience=simplepoint-api
simplepoint.datasource.default-name=postgres
simplepoint.datasource.list[0].name=postgres
simplepoint.datasource.list[0].url=jdbc:postgresql://localhost:5432/simplepoint
simplepoint.datasource.list[0].username=postgres
simplepoint.datasource.list[0].password=postgres
simplepoint.datasource.list[0].driver-class-name=org.postgresql.Driver

spring.security.oauth2.resourceserver.jwt.issuer-uri=${server.oauth2.issuer-uri}
spring.security.oauth2.resourceserver.jwt.jws-algorithms[0]=PS256
spring.security.oauth2.client.provider.simplepoint.issuer-uri=${server.oauth2.issuer-uri}
spring.security.oauth2.client.registration.simplepoint-client.client-name=simplepoint-client
spring.security.oauth2.client.registration.simplepoint-client.client-id=simplepoint-client
spring.security.oauth2.client.registration.simplepoint-client.client-secret=secret
spring.security.oauth2.client.registration.simplepoint-client.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.simplepoint-client.scope[0]=openid
spring.security.oauth2.client.registration.simplepoint-client.scope[1]=profile
spring.security.oauth2.client.registration.simplepoint-client.scope[2]=roles
spring.security.oauth2.client.registration.simplepoint-client.scope[3]=tenant
spring.security.oauth2.client.registration.simplepoint-client.scope[4]=organs
spring.security.oauth2.client.registration.simplepoint-client.scope[5]=email
spring.security.oauth2.client.registration.simplepoint-client.scope[6]=address
spring.security.oauth2.client.registration.simplepoint-client.scope[7]=phone
spring.security.oauth2.client.registration.simplepoint-client.redirect-uri=${server.oauth2.client.base-uri}/login/oauth2/code/oidc
spring.security.oauth2.client.registration.simplepoint-client.post-logout-redirect-uris[0]=${server.oauth2.client.base-uri}
spring.security.oauth2.client.registration.simplepoint-client.provider=simplepoint

spring.cloud.consul.discovery.health-check-path=/actuator/health
spring.cloud.consul.discovery.health-interval=10s
