version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:0.8.1-pg16
    environment:
      POSTGRES_DB: simplepoint
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - simplepoint
    deploy:
      restart_policy:
        condition: any

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - simplepoint
    deploy:
      restart_policy:
        condition: any

  consul:
    image: hashicorp/consul:1.20
    command: ["agent", "-dev", "-client=0.0.0.0", "-ui"]
    ports:
      - target: 8500
        published: 8500
        protocol: tcp
        mode: host
      - target: 8600
        published: 8600
        protocol: tcp
        mode: host
    networks:
      - simplepoint
    deploy:
      restart_policy:
        condition: any

  bootstrap:
    image: ${SIMPLEPOINT_BOOTSTRAP_IMAGE:-simplepoint/bootstrap:swarm}
    environment:
      CONSUL_ADDR: http://consul:8500
      PUBLIC_HOST: ${SIMPLEPOINT_PUBLIC_HOST:?Set SIMPLEPOINT_PUBLIC_HOST before deploying the stack}
    networks:
      - simplepoint
    deploy:
      restart_policy:
        condition: none

  authorization:
    image: ${SIMPLEPOINT_AUTH_IMAGE:-simplepoint/authorization:swarm}
    environment:
      SPRING_PROFILES_ACTIVE: dev,swarm
      SIMPLEPOINT_AUTHORIZATION_SERVICE_CLIENT_SECRET: ${SIMPLEPOINT_AUTHORIZATION_SERVICE_CLIENT_SECRET:-dev-authorization-service-secret}
      SIMPLEPOINT_COMMON_SERVICE_CLIENT_SECRET: ${SIMPLEPOINT_COMMON_SERVICE_CLIENT_SECRET:-dev-common-service-secret}
      SIMPLEPOINT_AUDITING_SERVICE_CLIENT_SECRET: ${SIMPLEPOINT_AUDITING_SERVICE_CLIENT_SECRET:-dev-auditing-service-secret}
      SIMPLEPOINT_DNA_SERVICE_CLIENT_SECRET: ${SIMPLEPOINT_DNA_SERVICE_CLIENT_SECRET:-dev-dna-service-secret}
      SIMPLEPOINT_AI_SERVICE_CLIENT_SECRET: ${SIMPLEPOINT_AI_SERVICE_CLIENT_SECRET:-dev-ai-service-secret}
      SIMPLEPOINT_HOST_SERVICE_CLIENT_SECRET: ${SIMPLEPOINT_HOST_SERVICE_CLIENT_SECRET:-dev-host-service-secret}
    ports:
      - target: 9000
        published: 9000
        protocol: tcp
        mode: host
    networks:
      - simplepoint
    deploy:
      restart_policy:
        condition: any

  common:
    image: ${SIMPLEPOINT_COMMON_IMAGE:-simplepoint/common:swarm}
    environment:
      SPRING_PROFILES_ACTIVE: dev,swarm
      SIMPLEPOINT_ADMIN_EMAIL: ${SIMPLEPOINT_ADMIN_EMAIL:-simplepoint@mail.com}
      SIMPLEPOINT_ADMIN_PASSWORD: ${SIMPLEPOINT_ADMIN_PASSWORD:-123456}
      SIMPLEPOINT_TENANT_MANAGER_EMAIL: ${SIMPLEPOINT_TENANT_MANAGER_EMAIL:-manager@simplepoint.local}
      SIMPLEPOINT_TENANT_MANAGER_PASSWORD: ${SIMPLEPOINT_TENANT_MANAGER_PASSWORD:-123456}
      SIMPLEPOINT_TENANT_MEMBER_EMAIL: ${SIMPLEPOINT_TENANT_MEMBER_EMAIL:-member@simplepoint.local}
      SIMPLEPOINT_TENANT_MEMBER_PASSWORD: ${SIMPLEPOINT_TENANT_MEMBER_PASSWORD:-123456}
      SIMPLEPOINT_DEFAULT_ORGANIZATION_NAME: ${SIMPLEPOINT_DEFAULT_ORGANIZATION_NAME:-SimplePoint 示例组织}
      SIMPLEPOINT_COMMON_SERVICE_CLIENT_SECRET: ${SIMPLEPOINT_COMMON_SERVICE_CLIENT_SECRET:-dev-common-service-secret}
      SIMPLEPOINT_STORAGE_CREDENTIAL_ENCRYPTION_KEY: ${SIMPLEPOINT_STORAGE_CREDENTIAL_ENCRYPTION_KEY:-dev-storage-credential-encryption-key-change-me}
    networks:
      - simplepoint
    deploy:
      restart_policy:
        condition: any

  auditing:
    image: ${SIMPLEPOINT_AUDITING_IMAGE:-simplepoint/auditing:swarm}
    environment:
      SPRING_PROFILES_ACTIVE: dev,swarm
      SIMPLEPOINT_WAIT_FOR: postgres:5432,redis:6379,consul:8500,authorization:9000,common:7000
      SIMPLEPOINT_WAIT_FOR_URLS: http://consul:8500/v1/kv/simplepoint/bootstrap/status?raw
      SIMPLEPOINT_WAIT_TIMEOUT: 240
      SIMPLEPOINT_AUDITING_SERVICE_CLIENT_SECRET: ${SIMPLEPOINT_AUDITING_SERVICE_CLIENT_SECRET:-dev-auditing-service-secret}
    networks:
      - simplepoint
    deploy:
      restart_policy:
        condition: any

  dna:
    image: ${SIMPLEPOINT_DNA_IMAGE:-simplepoint/dna:swarm}
    environment:
      SPRING_PROFILES_ACTIVE: dev,swarm
      SIMPLEPOINT_WAIT_FOR: postgres:5432,redis:6379,consul:8500,authorization:9000,common:7000
      SIMPLEPOINT_WAIT_FOR_URLS: http://consul:8500/v1/kv/simplepoint/bootstrap/status?raw
      SIMPLEPOINT_WAIT_TIMEOUT: 240
      SIMPLEPOINT_DNA_SERVICE_CLIENT_SECRET: ${SIMPLEPOINT_DNA_SERVICE_CLIENT_SECRET:-dev-dna-service-secret}
    ports:
      - target: 15432
        published: 15432
        protocol: tcp
        mode: host
    networks:
      - simplepoint
    deploy:
      restart_policy:
        condition: any

  ai:
    image: ${SIMPLEPOINT_AI_IMAGE:-simplepoint/ai:swarm}
    environment:
      SPRING_PROFILES_ACTIVE: dev,swarm
      SIMPLEPOINT_WAIT_FOR: postgres:5432,redis:6379,consul:8500,authorization:9000,common:7000
      SIMPLEPOINT_WAIT_FOR_URLS: http://consul:8500/v1/kv/simplepoint/bootstrap/status?raw
      SIMPLEPOINT_WAIT_TIMEOUT: 240
      SIMPLEPOINT_AI_SERVICE_CLIENT_SECRET: ${SIMPLEPOINT_AI_SERVICE_CLIENT_SECRET:-dev-ai-service-secret}
      SIMPLEPOINT_AI_CREDENTIAL_ENCRYPTION_KEY: ${SIMPLEPOINT_AI_CREDENTIAL_ENCRYPTION_KEY:-dev-ai-credential-encryption-key-change-me}
      SIMPLEPOINT_AI_API_KEY_HASH_PEPPER: ${SIMPLEPOINT_AI_API_KEY_HASH_PEPPER:-dev-ai-model-api-key-pepper-change-me}
      SIMPLEPOINT_AI_API_KEY_DEFAULT_RATE_LIMIT_PER_MINUTE: ${SIMPLEPOINT_AI_API_KEY_DEFAULT_RATE_LIMIT_PER_MINUTE:-60}
      SIMPLEPOINT_AI_TENANT_PROVIDER_MANAGEMENT_ENABLED: ${SIMPLEPOINT_AI_TENANT_PROVIDER_MANAGEMENT_ENABLED:-true}
    networks:
      - simplepoint
    deploy:
      restart_policy:
        condition: any

  host:
    image: ${SIMPLEPOINT_HOST_IMAGE:-simplepoint/host:swarm}
    environment:
      SPRING_PROFILES_ACTIVE: dev,swarm
      SIMPLEPOINT_HOST_SERVICE_CLIENT_SECRET: ${SIMPLEPOINT_HOST_SERVICE_CLIENT_SECRET:-dev-host-service-secret}
    ports:
      - target: 8080
        published: 8080
        protocol: tcp
        mode: host
    networks:
      - simplepoint
    deploy:
      restart_policy:
        condition: any

networks:
  simplepoint:
    driver: overlay
    attachable: true

volumes:
  postgres_data:
  redis_data:
