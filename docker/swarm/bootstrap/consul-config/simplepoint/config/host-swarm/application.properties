server.port=8080
spring.cloud.consul.discovery.health-check-url=http://host:8080${spring.cloud.consul.discovery.health-check-path}
simplepoint.service-router.internal-auth.oauth2.client-id=simplepoint-service-host
simplepoint.service-router.internal-auth.oauth2.client-secret=${SIMPLEPOINT_HOST_SERVICE_CLIENT_SECRET:dev-host-service-secret}
spring.security.oauth2.client.provider.simplepoint.authorization-uri=http://__PUBLIC_HOST__:9000/oauth2/authorize
spring.security.oauth2.client.provider.simplepoint.token-uri=http://authorization:9000/oauth2/token
spring.security.oauth2.client.provider.simplepoint.jwk-set-uri=http://authorization:9000/oauth2/jwks
spring.security.oauth2.client.provider.simplepoint.user-info-uri=http://authorization:9000/userinfo
spring.security.oauth2.client.provider.simplepoint.user-name-attribute=sub
spring.security.oauth2.client.registration.simplepoint-client.client-name=simplepoint-client
spring.security.oauth2.client.registration.simplepoint-client.client-id=simplepoint-client
spring.security.oauth2.client.registration.simplepoint-client.client-secret=secret
spring.security.oauth2.client.registration.simplepoint-client.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.simplepoint-client.scope[0]=openid
spring.security.oauth2.client.registration.simplepoint-client.scope[1]=profile
spring.security.oauth2.client.registration.simplepoint-client.scope[2]=roles
spring.security.oauth2.client.registration.simplepoint-client.scope[3]=tenant
spring.security.oauth2.client.registration.simplepoint-client.scope[4]=organs
spring.security.oauth2.client.registration.simplepoint-client.scope[5]=email
spring.security.oauth2.client.registration.simplepoint-client.scope[6]=address
spring.security.oauth2.client.registration.simplepoint-client.scope[7]=phone
spring.security.oauth2.client.registration.simplepoint-client.redirect-uri=http://__PUBLIC_HOST__:8080/login/oauth2/code/oidc
spring.security.oauth2.client.registration.simplepoint-client.provider=simplepoint
