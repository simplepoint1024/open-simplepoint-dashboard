server.port=2888
spring.cloud.consul.discovery.health-check-url=http://ai:2888${spring.cloud.consul.discovery.health-check-path}
simplepoint.service-router.internal-auth.oauth2.client-id=simplepoint-service-ai
simplepoint.service-router.internal-auth.oauth2.client-secret=${SIMPLEPOINT_AI_SERVICE_CLIENT_SECRET:dev-ai-service-secret}
simplepoint.security.oauth2.token.audience=simplepoint-api
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://__PUBLIC_HOST__:9000
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://authorization:9000/oauth2/jwks
spring.security.oauth2.resourceserver.jwt.jws-algorithms[0]=PS256
simplepoint.security.oauth2.user-info-uri=http://authorization:9000/userinfo
simplepoint.storage.remote.service-name=${SIMPLEPOINT_STORAGE_REMOTE_SERVICE_NAME:common}
