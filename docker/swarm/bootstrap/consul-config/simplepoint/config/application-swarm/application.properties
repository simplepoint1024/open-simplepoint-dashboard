spring.data.redis.host=redis
spring.data.redis.port=6379
server.servlet.session.timeout=8h
spring.session.timeout=8h
server.reactive.session.timeout=8h
spring.security.oauth2.client.defaults.require-authorization-consent=true
spring.security.oauth2.client.defaults.require-proof-key=true
spring.security.oauth2.client.defaults.access-token-time-to-live=30m
spring.security.oauth2.client.defaults.refresh-token-time-to-live=8h
spring.security.oauth2.client.defaults.authorization-code-time-to-live=5m
spring.security.oauth2.client.defaults.device-code-time-to-live=5m
spring.security.oauth2.client.defaults.reuse-refresh-tokens=true
simplepoint.service-router.internal-auth.mode=oauth2
simplepoint.service-router.internal-auth.oauth2.token-uri=http://authorization:9000/oauth2/token
simplepoint.service-router.internal-auth.oauth2.scopes[0]=service-router.invoke
simplepoint.service-router.internal-auth.oauth2.required-authority=SCOPE_service-router.invoke
