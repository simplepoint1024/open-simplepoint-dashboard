server.port=9000
spring.cloud.consul.discovery.health-check-url=http://authorization:9000${spring.cloud.consul.discovery.health-check-path}
spring.security.oauth2.authorizationserver.issuer=http://__PUBLIC_HOST__:9000
simplepoint.security.oauth2.token.audience=simplepoint-api
simplepoint.service-router.internal-auth.oauth2.client-id=simplepoint-service-authorization
simplepoint.service-router.internal-auth.oauth2.client-secret=${SIMPLEPOINT_AUTHORIZATION_SERVICE_CLIENT_SECRET:dev-authorization-service-secret}

spring.security.oauth2.client.provider.simplepoint.authorization-uri=http://__PUBLIC_HOST__:9000/oauth2/authorize
spring.security.oauth2.client.provider.simplepoint.token-uri=http://authorization:9000/oauth2/token
spring.security.oauth2.client.provider.simplepoint.jwk-set-uri=http://authorization:9000/oauth2/jwks
spring.security.oauth2.client.provider.simplepoint.user-info-uri=http://authorization:9000/userinfo
spring.security.oauth2.client.provider.simplepoint.user-name-attribute=sub

spring.security.oauth2.client.registration.simplepoint-client.client-name=simplepoint-client
spring.security.oauth2.client.registration.simplepoint-client.client-id=simplepoint-client
spring.security.oauth2.client.registration.simplepoint-client.client-secret=secret
spring.security.oauth2.client.registration.simplepoint-client.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.simplepoint-client.scope[0]=openid
spring.security.oauth2.client.registration.simplepoint-client.scope[1]=profile
spring.security.oauth2.client.registration.simplepoint-client.scope[2]=roles
spring.security.oauth2.client.registration.simplepoint-client.scope[3]=tenant
spring.security.oauth2.client.registration.simplepoint-client.scope[4]=organs
spring.security.oauth2.client.registration.simplepoint-client.scope[5]=email
spring.security.oauth2.client.registration.simplepoint-client.scope[6]=address
spring.security.oauth2.client.registration.simplepoint-client.scope[7]=phone
spring.security.oauth2.client.registration.simplepoint-client.redirect-uri=http://__PUBLIC_HOST__:8080/login/oauth2/code/oidc
spring.security.oauth2.client.registration.simplepoint-client.post-logout-redirect-uris[0]=http://__PUBLIC_HOST__:8080
spring.security.oauth2.client.registration.simplepoint-client.provider=simplepoint
spring.security.oauth2.client.registration.simplepoint-client.require-authorization-consent=false
spring.security.oauth2.client.registration.simplepoint-client.access-token-time-to-live=30m
spring.security.oauth2.client.registration.simplepoint-client.refresh-token-time-to-live=8h

spring.security.oauth2.client.registration.simplepoint-service-authorization.client-name=SimplePoint Authorization Service
spring.security.oauth2.client.registration.simplepoint-service-authorization.client-id=simplepoint-service-authorization
spring.security.oauth2.client.registration.simplepoint-service-authorization.client-secret=${SIMPLEPOINT_AUTHORIZATION_SERVICE_CLIENT_SECRET:dev-authorization-service-secret}
spring.security.oauth2.client.registration.simplepoint-service-authorization.client-authentication-method=client_secret_basic
spring.security.oauth2.client.registration.simplepoint-service-authorization.authorization-grant-type=client_credentials
spring.security.oauth2.client.registration.simplepoint-service-authorization.scope[0]=service-router.invoke
spring.security.oauth2.client.registration.simplepoint-service-authorization.provider=simplepoint

spring.security.oauth2.client.registration.simplepoint-service-common.client-name=SimplePoint Common Service
spring.security.oauth2.client.registration.simplepoint-service-common.client-id=simplepoint-service-common
spring.security.oauth2.client.registration.simplepoint-service-common.client-secret=${SIMPLEPOINT_COMMON_SERVICE_CLIENT_SECRET:dev-common-service-secret}
spring.security.oauth2.client.registration.simplepoint-service-common.client-authentication-method=client_secret_basic
spring.security.oauth2.client.registration.simplepoint-service-common.authorization-grant-type=client_credentials
spring.security.oauth2.client.registration.simplepoint-service-common.scope[0]=service-router.invoke
spring.security.oauth2.client.registration.simplepoint-service-common.provider=simplepoint

spring.security.oauth2.client.registration.simplepoint-service-auditing.client-name=SimplePoint Auditing Service
spring.security.oauth2.client.registration.simplepoint-service-auditing.client-id=simplepoint-service-auditing
spring.security.oauth2.client.registration.simplepoint-service-auditing.client-secret=${SIMPLEPOINT_AUDITING_SERVICE_CLIENT_SECRET:dev-auditing-service-secret}
spring.security.oauth2.client.registration.simplepoint-service-auditing.client-authentication-method=client_secret_basic
spring.security.oauth2.client.registration.simplepoint-service-auditing.authorization-grant-type=client_credentials
spring.security.oauth2.client.registration.simplepoint-service-auditing.scope[0]=service-router.invoke
spring.security.oauth2.client.registration.simplepoint-service-auditing.provider=simplepoint

spring.security.oauth2.client.registration.simplepoint-service-dna.client-name=SimplePoint DNA Service
spring.security.oauth2.client.registration.simplepoint-service-dna.client-id=simplepoint-service-dna
spring.security.oauth2.client.registration.simplepoint-service-dna.client-secret=${SIMPLEPOINT_DNA_SERVICE_CLIENT_SECRET:dev-dna-service-secret}
spring.security.oauth2.client.registration.simplepoint-service-dna.client-authentication-method=client_secret_basic
spring.security.oauth2.client.registration.simplepoint-service-dna.authorization-grant-type=client_credentials
spring.security.oauth2.client.registration.simplepoint-service-dna.scope[0]=service-router.invoke
spring.security.oauth2.client.registration.simplepoint-service-dna.provider=simplepoint

spring.security.oauth2.client.registration.simplepoint-service-host.client-name=SimplePoint Host Service
spring.security.oauth2.client.registration.simplepoint-service-host.client-id=simplepoint-service-host
spring.security.oauth2.client.registration.simplepoint-service-host.client-secret=${SIMPLEPOINT_HOST_SERVICE_CLIENT_SECRET:dev-host-service-secret}
spring.security.oauth2.client.registration.simplepoint-service-host.client-authentication-method=client_secret_basic
spring.security.oauth2.client.registration.simplepoint-service-host.authorization-grant-type=client_credentials
spring.security.oauth2.client.registration.simplepoint-service-host.scope[0]=service-router.invoke
spring.security.oauth2.client.registration.simplepoint-service-host.provider=simplepoint
