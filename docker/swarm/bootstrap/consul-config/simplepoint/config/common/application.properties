simplepoint.security.users[0].email=${SIMPLEPOINT_ADMIN_EMAIL:simplepoint@mail.com}
simplepoint.security.users[0].password=${SIMPLEPOINT_ADMIN_PASSWORD:123456}
simplepoint.security.users[0].email-verified=true
simplepoint.security.users[0].nickname=Simple Point
simplepoint.security.users[0].super-admin=true
simplepoint.security.users[1].email=${SIMPLEPOINT_TENANT_MANAGER_EMAIL:manager@simplepoint.local}
simplepoint.security.users[1].password=${SIMPLEPOINT_TENANT_MANAGER_PASSWORD:123456}
simplepoint.security.users[1].email-verified=true
simplepoint.security.users[1].nickname=Tenant Manager
simplepoint.security.users[1].super-admin=false
simplepoint.security.users[2].email=${SIMPLEPOINT_TENANT_MEMBER_EMAIL:member@simplepoint.local}
simplepoint.security.users[2].password=${SIMPLEPOINT_TENANT_MEMBER_PASSWORD:123456}
simplepoint.security.users[2].email-verified=true
simplepoint.security.users[2].nickname=Tenant Member
simplepoint.security.users[2].super-admin=false

simplepoint.tenant.bootstrap.organization-name=${SIMPLEPOINT_DEFAULT_ORGANIZATION_NAME:SimplePoint 示例组织}
simplepoint.tenant.bootstrap.organization-description=系统初始化的组织租户，用于展示租户资源、角色和成员授权
simplepoint.tenant.bootstrap.owner-subject=${SIMPLEPOINT_ADMIN_EMAIL:simplepoint@mail.com}
simplepoint.tenant.bootstrap.manager-subject=${SIMPLEPOINT_TENANT_MANAGER_EMAIL:manager@simplepoint.local}
simplepoint.tenant.bootstrap.member-subject=${SIMPLEPOINT_TENANT_MEMBER_EMAIL:member@simplepoint.local}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

simplepoint.platform.bootstrap.enabled=true
simplepoint.platform.bootstrap.fail-fast=true
simplepoint.platform.bootstrap.services[0]=common
simplepoint.platform.bootstrap.contributions.system-user.enabled=true
simplepoint.platform.bootstrap.contributions.i18n-base.enabled=true
simplepoint.platform.bootstrap.contributions.i18n-messages.enabled=true
simplepoint.platform.bootstrap.contributions.i18n-bootstrap-v2.enabled=true
simplepoint.platform.bootstrap.contributions.platform-organization-type-dictionary.enabled=true
simplepoint.platform.bootstrap.contributions.default-tenant-workspace.enabled=true
