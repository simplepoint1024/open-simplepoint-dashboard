services:
  simple_point_postgresql:
    container_name: sp_postgresql
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: simplepoint
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d simplepoint"]
      interval: 10s
      timeout: 5s
      retries: 5

  simple_point_mysql:
    container_name: sp_mysql
    image: mysql:8.0.41-debian
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: simplepoint
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  simple_point_consul:
    container_name: sp_consul
    build:
      context: .
      dockerfile: ./consul/Dockerfile
    restart: unless-stopped
    command: ["consul", "agent", "-dev", "-client=0.0.0.0", "-ui"]
    ports:
      - "8500:8500"
      - "8600:8600"
      - "8301:8301"
      - "8302:8302"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8500/v1/status/leader >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  simple_point_redis:
    container_name: sp_redis
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  mysql_data:
  redis_data:
