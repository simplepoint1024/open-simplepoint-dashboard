<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>配置两步验证 · Simple·Point</title>
    <link rel="stylesheet" th:href="${twoFactorCssUrl}" href="/two-factor.css"/>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>
<main class="security-shell">
    <div class="brand"><span class="brand-mark">S</span><span>Simple·Point</span></div>
    <section class="security-card">
        <header class="card-head">
            <div class="security-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="3" width="16" height="18" rx="3"/><path d="M8 7h2M14 7h2M8 11h2M14 11h2M8 15h8"/></svg>
            </div>
            <h1>配置身份验证器</h1>
            <p class="subtitle">扫码绑定后，输入一次动态验证码完成确认。</p>
        </header>
        <div class="card-body">
            <div class="steps">
                <div class="step active"><span class="step-number">1</span>扫码绑定</div>
                <div class="step active"><span class="step-number">2</span>输入验证码</div>
                <div class="step"><span class="step-number">3</span>完成保护</div>
            </div>

            <div class="qr-section">
                <div class="qr-frame"><div id="qrcode" aria-label="身份验证器二维码"></div></div>
                <div class="setup-copy">
                    <h2>使用身份验证器扫码</h2>
                    <p>打开身份验证器应用，选择添加账号并扫描左侧二维码。</p>
                    <div class="secret-box">
                        <small>无法扫码？手动输入此密钥</small>
                        <div class="secret-value">
                            <code id="secret" th:text="${secret}">SECRET</code>
                            <button type="button" class="copy-button" onclick="copySecret(this)">复制</button>
                        </div>
                    </div>
                </div>
            </div>

            <form class="verify-form" method="post" th:action="${twoFactorConfirmUrl}">
                <p th:if="${error}" class="error" th:text="${error}"></p>
                <label class="field-label" for="code">输入身份验证器生成的 6 位验证码</label>
                <div class="code-row">
                    <input class="code-input" id="code" name="code" type="text" inputmode="numeric" maxlength="6" autocomplete="one-time-code" pattern="[0-9]{6}" autofocus required/>
                    <button type="submit">确认并开启</button>
                </div>
            </form>
        </div>
    </section>
</main>
<script th:inline="javascript">
    /*<![CDATA[*/
    var otpauthUrl = /*[[${otpauthUrl}]]*/ '';
    if (otpauthUrl && window.QRCode) {
        new QRCode(document.getElementById('qrcode'), {text: otpauthUrl, width: 200, height: 200});
    }
    function copySecret(button) {
        var text = document.getElementById('secret').textContent || '';
        navigator.clipboard.writeText(text).then(function () {
            button.textContent = '已复制';
            window.setTimeout(function () { button.textContent = '复制'; }, 1500);
        });
    }
    /*]]>*/
</script>
</body>
</html>
