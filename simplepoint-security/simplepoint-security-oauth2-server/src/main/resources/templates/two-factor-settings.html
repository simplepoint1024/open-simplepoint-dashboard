<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>两步验证 · Simple·Point</title>
    <link rel="stylesheet" th:href="${twoFactorCssUrl}" href="/two-factor.css"/>
</head>
<body>
<main class="security-shell compact">
    <div class="brand"><span class="brand-mark">S</span><span>Simple·Point</span></div>
    <section class="security-card">
        <header class="card-head">
            <div class="security-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3 4.8 6v5.3c0 4.4 3 8.4 7.2 9.7 4.2-1.3 7.2-5.3 7.2-9.7V6L12 3Z"/><path d="m9.3 12 1.8 1.8 3.8-4"/></svg>
            </div>
            <h1>两步验证</h1>
            <p class="subtitle">除了密码，再使用身份验证器中的动态验证码保护你的账号。</p>
        </header>
        <div class="card-body">
            <div th:if="${twoFactorEnabled}" class="status-panel enabled">
                <span class="status-dot"></span>
                <div class="status-copy"><strong>保护已开启</strong><span>登录时需要输入 6 位动态验证码</span></div>
            </div>
            <div th:unless="${twoFactorEnabled}" class="status-panel">
                <span class="status-dot"></span>
                <div class="status-copy"><strong>尚未开启</strong><span>建议立即配置，降低密码泄露风险</span></div>
            </div>

            <div class="actions">
                <form th:if="${!twoFactorEnabled}" th:action="${twoFactorEnableUrl}" method="post">
                    <button type="submit">开始配置</button>
                </form>
                <form th:if="${twoFactorEnabled}" th:action="${twoFactorDisableUrl}" method="post">
                    <button class="danger" type="submit">关闭两步验证</button>
                </form>
                <button type="button" class="secondary" onclick="window.close()">关闭页面</button>
            </div>

            <div class="info-box"><strong>支持的应用</strong><br/>Google Authenticator、Microsoft Authenticator、Authy 以及其他兼容 TOTP 的身份验证器。</div>
            <p class="privacy-note">请勿向任何人透露密钥或动态验证码。</p>
        </div>
    </section>
</main>
</body>
</html>
