<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Authorize Application</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #667085;
      --border: #d9e0ec;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --danger: #b42318;
      --warning-bg: #fff7e6;
      --warning-border: #ffd591;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      padding: 32px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    main {
      width: min(720px, 100%);
    }

    .panel {
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 18px 40px rgba(31, 41, 55, 0.08);
    }

    .header,
    .footer {
      padding: 24px 28px;
    }

    .header {
      border-bottom: 1px solid var(--border);
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.25;
      font-weight: 650;
    }

    .summary {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .summary strong {
      color: var(--text);
      font-weight: 650;
    }

    .content {
      padding: 24px 28px 8px;
    }

    .notice {
      margin: 0 0 20px;
      padding: 12px 14px;
      border: 1px solid var(--warning-border);
      border-radius: 8px;
      background: var(--warning-bg);
      color: #7a4b00;
      font-size: 14px;
      line-height: 1.5;
    }

    .section-title {
      margin: 0 0 12px;
      font-size: 15px;
      font-weight: 650;
    }

    .scope-list {
      display: grid;
      gap: 10px;
      margin: 0 0 20px;
      padding: 0;
      list-style: none;
    }

    .scope-item {
      display: grid;
      grid-template-columns: 20px 1fr;
      gap: 12px;
      align-items: flex-start;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #ffffff;
    }

    .scope-item input {
      width: 16px;
      height: 16px;
      margin: 2px 0 0;
      accent-color: var(--primary);
    }

    .scope-name {
      display: block;
      font-size: 14px;
      font-weight: 650;
      line-height: 1.35;
    }

    .scope-desc {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .approved {
      background: #f8fafc;
    }

    .footer {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      border-top: 1px solid var(--border);
      background: #fbfcfe;
    }

    button {
      min-width: 112px;
      height: 38px;
      border-radius: 6px;
      border: 1px solid transparent;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--primary);
      color: #ffffff;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .btn-cancel {
      border-color: var(--border);
      background: #ffffff;
      color: var(--text);
    }

    .btn-cancel:hover {
      color: var(--danger);
      border-color: #fda29b;
    }

    @media (max-width: 560px) {
      body {
        align-items: flex-start;
        padding: 16px;
      }

      .header,
      .content,
      .footer {
        padding-left: 18px;
        padding-right: 18px;
      }

      .footer {
        flex-direction: column-reverse;
      }

      button {
        width: 100%;
      }
    }
  </style>
  <script>
    function cancelConsent() {
      document.consent_form.reset();
      document.consent_form.submit();
    }
  </script>
</head>
<body>
<main>
  <form name="consent_form" method="post" th:action="${requestURI}">
    <section class="panel" aria-labelledby="consent-title">
      <div class="header">
        <p class="eyebrow">OAuth2 Authorization</p>
        <h1 id="consent-title">Authorize application access</h1>
        <p class="summary">
          <strong th:text="${clientId}">client</strong>
          wants to access the account
          <strong th:text="${principalName}">user</strong>.
        </p>
      </div>

      <div class="content">
        <input type="hidden" name="client_id" th:value="${clientId}">
        <input type="hidden" name="state" th:value="${state}">
        <input th:if="${userCode}" type="hidden" name="user_code" th:value="${userCode}">

        <p class="notice" th:if="${userCode}">
          You provided code <strong th:text="${userCode}">code</strong>.
          Confirm that it matches the code displayed on your device.
        </p>

        <p class="section-title" th:if="${not #lists.isEmpty(scopes)}">
          Requested permissions
        </p>
        <ul class="scope-list" th:if="${not #lists.isEmpty(scopes)}">
          <li th:each="scope: ${scopes}" class="scope-item">
            <input type="checkbox" name="scope" th:value="${scope.scope}" th:id="${scope.scope}">
            <label th:for="${scope.scope}">
              <span class="scope-name" th:text="${scope.scope}">scope</span>
              <span class="scope-desc" th:text="${scope.description}">description</span>
            </label>
          </li>
        </ul>

        <p class="section-title" th:if="${not #lists.isEmpty(previouslyApprovedScopes)}">
          Already approved
        </p>
        <ul class="scope-list" th:if="${not #lists.isEmpty(previouslyApprovedScopes)}">
          <li th:each="scope: ${previouslyApprovedScopes}" class="scope-item approved">
            <input type="checkbox" disabled checked th:id="${'approved-' + scope.scope}">
            <input type="hidden" name="scope" th:value="${scope.scope}">
            <label th:for="${'approved-' + scope.scope}">
              <span class="scope-name" th:text="${scope.scope}">scope</span>
              <span class="scope-desc" th:text="${scope.description}">description</span>
            </label>
          </li>
        </ul>
      </div>

      <div class="footer">
        <button class="btn-cancel" type="button" onclick="cancelConsent()">Cancel</button>
        <button class="btn-primary" type="submit">Authorize</button>
      </div>
    </section>
  </form>
</main>
</body>
</html>
