<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>验证登录 · Simple·Point</title>
    <link rel="stylesheet" href="/two-factor.css"/>
</head>
<body>
<main class="security-shell compact">
    <div class="brand"><span class="brand-mark">S</span><span>Simple·Point</span></div>
    <section class="security-card verify-card">
        <header class="card-head">
            <div class="security-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
            </div>
            <h1>确认是你本人</h1>
            <p class="subtitle">请输入身份验证器中当前显示的 6 位动态验证码。</p>
        </header>
        <div class="card-body">
            <p th:if="${error}" class="error" th:text="${error}"></p>
            <form class="verify-form" style="margin-top:0;padding-top:0;border-top:0" th:action="@{/two-factor/verify}" method="post">
                <label class="field-label" for="code">动态验证码</label>
                <div class="code-row">
                    <input class="code-input" id="code" type="text" name="code" inputmode="numeric" placeholder="000000" autocomplete="one-time-code" required autofocus maxlength="6" pattern="[0-9]{6}"/>
                    <button type="submit">验证并继续</button>
                </div>
            </form>
            <div class="secure-hint">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m5 12 4 4L19 6"/></svg>
                <span>验证码只在短时间内有效。Simple·Point 不会要求你通过聊天或邮件提供验证码。</span>
            </div>
        </div>
    </section>
</main>
</body>
</html>
