server.port=2888
spring.application.name=ai
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=22MB

simplepoint.ai.knowledge.max-upload-bytes=20971520
simplepoint.ai.knowledge.max-extracted-characters=5000000
simplepoint.ai.knowledge.embedding-batch-size=64
simplepoint.ai.knowledge.stored-vector-dimensions=2000
simplepoint.ai.api-key-hash-pepper=${SIMPLEPOINT_AI_API_KEY_HASH_PEPPER:${SIMPLEPOINT_AI_CREDENTIAL_ENCRYPTION_KEY:}}
simplepoint.ai.api-key-default-rate-limit-per-minute=${SIMPLEPOINT_AI_API_KEY_DEFAULT_RATE_LIMIT_PER_MINUTE:60}
simplepoint.storage.remote.service-name=${SIMPLEPOINT_STORAGE_REMOTE_SERVICE_NAME:common}
simplepoint.service-router.http.connect-timeout=3s
simplepoint.service-router.http.read-timeout=30s
