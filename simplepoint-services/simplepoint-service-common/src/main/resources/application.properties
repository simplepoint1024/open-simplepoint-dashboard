server.port=2666
spring.application.name=common
simplepoint.storage.credential-encryption-key=${SIMPLEPOINT_STORAGE_CREDENTIAL_ENCRYPTION_KEY:dev-storage-credential-encryption-key-change-me}
simplepoint.storage.bootstrap.minio.enabled=${SIMPLEPOINT_STORAGE_BOOTSTRAP_MINIO_ENABLED:false}
simplepoint.storage.bootstrap.minio.endpoint=${SIMPLEPOINT_STORAGE_BOOTSTRAP_MINIO_ENDPOINT:http://minio:9000}
simplepoint.storage.bootstrap.minio.access-key=${SIMPLEPOINT_MINIO_ROOT_USER:}
simplepoint.storage.bootstrap.minio.secret-key=${SIMPLEPOINT_MINIO_ROOT_PASSWORD:}
simplepoint.storage.bootstrap.minio.bucket=${SIMPLEPOINT_MINIO_BUCKET:simplepoint}
simplepoint.storage.bootstrap.minio.default-provider=${SIMPLEPOINT_STORAGE_BOOTSTRAP_MINIO_DEFAULT_PROVIDER:true}
